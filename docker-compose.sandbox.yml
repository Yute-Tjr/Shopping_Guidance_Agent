services:
  mysql:
    image: mysql:8.0
    container_name: pricecat_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pwd
      MYSQL_DATABASE: shopping_guide
      MYSQL_USER: shopping_user
      MYSQL_PASSWORD: shopping_pwd
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot_pwd"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    container_name: pricecat_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ./server/.env
    environment:
      MYSQL_DSN: mysql+asyncmy://shopping_user:shopping_pwd@mysql:3306/shopping_guide?charset=utf8mb4
      MILVUS_DB_PATH: /app/data/milvus_lite.db
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./server/data:/app/data

volumes:
  mysql_data:

# 本地 MySQL 8 一键启动（开发期 demo 用）
# 使用方法：
#   cd docker/mysql && docker compose up -d
#   docker exec shopping_mysql mysqladmin ping -h 127.0.0.1 -u root -proot_pwd
services:
  mysql:
    image: mysql:8.0
    container_name: shopping_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pwd
      MYSQL_DATABASE: shopping_guide
      MYSQL_USER: shopping_user
      MYSQL_PASSWORD: shopping_pwd
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot_pwd"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
